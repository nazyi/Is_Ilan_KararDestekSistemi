<!DOCTYPE html>
{% load static %}
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" type="text/css" href="{% static 'css/personel_uye_ol.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    <title>Personel Üye Ol</title>
</head>
<body>
    <div class="personel-bilgi-container">
        <h2>Üye Ol</h2>
        <form method="POST" action="{% url 'personel_uye_ol' %}">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="name" placeholder="Ad / Soyad" required><br>
            </div>
            <div class="form-group">
                <input type="text" name="phone" placeholder="Telefon Numarası" required><br>
            </div>
            <div class="form-group">
                <input type="text" name="gender" placeholder="Cinsiyet" required><br>
            </div>
            <div class="form-group">
                <input type="number" name="age" placeholder="Yaş" required><br>
            </div>
            <div class="form-group">
                <input type="email" name="mail" placeholder="E-posta" required><br>
            </div>
            <div class="form-group">
                <input type="password" name="sifre" placeholder="Şifre" required><br>
            </div>
            <div class="form-group">
                <button type="submit">Kayıt Ol</button>
            </div>
        </form>        
    </div>
    <div class="foto-container">
        <img src="{% static 'personel-üye.jpg' %}">
    </div>
</body>
</html>
