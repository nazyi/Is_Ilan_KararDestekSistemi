<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başarı</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
        }
        .message {
            text-align: center;
            padding: 20px;
            border: 2px solid #4CAF50;
            background-color: #e8f5e9;
            border-radius: 10px;
        }
        h1 {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>Başarıyla Tamamlandı!</h1>
        <p>İşleminiz başarıyla gerçekleşti. Teşekkür ederiz!</p>
    </div>
</body>
</html>
